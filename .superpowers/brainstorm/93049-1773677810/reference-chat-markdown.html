<h2>CCCLaw 聊天产品方向参考</h2>
<p class="subtitle">这一屏先对齐参考语境：你之前想要的产品样式接近“文档 + 对话 + Markdown 阅读体验”的融合形态。</p>

<div class="section">
  <div class="mockup">
    <div class="mockup-header">参考图：docs/chat-markdown.png</div>
    <div class="mockup-body" style="padding:0">

<div class="section">
  <div class="options">
    <div class="option" data-choice="a" onclick="toggleSelect(this)">
      <div class="letter">A</div>
      <div class="content">
        <h3>以阅读体验为核心</h3>

      </div>
    </div>
    <div class="option" data-choice="b" onclick="toggleSelect(this)">
      <div class="letter">B</div>
      <div class="content">
        <h3>以聊天体验为核心</h3>
        <p>主区仍是对话流，但比普通聊天产品更重排版、更像可阅读的知识工作台。</p>
      </div>
    </div>
    <div class="option" data-choice="c" onclick="toggleSelect(this)">

      </div>
    </div>
  </div>
</div>
